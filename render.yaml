services:
  - type: web
    name: simployer-qa-web
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: worker
    name: simployer-qa-worker
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python worker.py"
